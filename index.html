<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>四五快读 - 小猪猪学中文</title>
<style>
/* ===== RESET & BASE ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f0f4ff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ===== CSS VARIABLES ===== */
:root {
  --green: #58cc02;
  --green-dark: #46a302;
  --blue: #1cb0f6;
  --blue-dark: #0995d6;
  --orange: #ff9600;
  --red: #ff4b4b;
  --purple: #ce82ff;
  --gold: #ffc800;
  --gray-light: #e5e5e5;
  --gray: #afafaf;
  --gray-dark: #777;
  --bg: #f0f4ff;
  --white: #ffffff;
  --text: #3c3c3c;
  --shadow: 0 4px 0;
  --radius: 16px;
}

/* ===== SCREENS ===== */
.screen {
  display: none;
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
  flex-direction: column;
}
.screen.active { display: flex; }

/* ===== HOME SCREEN (Study Path) ===== */
#homeScreen {
  background: linear-gradient(180deg, #e8f5e9 0%, #f0f4ff 30%);
}

.home-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 8px;
  background: var(--white);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  z-index: 10;
}

.home-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
}

.streak-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  background: #fff3e0;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 14px;
  font-weight: 700;
  color: var(--orange);
}

.xp-bar-container {
  padding: 8px 20px;
  background: var(--white);
}
.xp-bar {
  height: 8px;
  background: var(--gray-light);
  border-radius: 4px;
  overflow: hidden;
}
.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--orange));
  border-radius: 4px;
  transition: width 0.5s ease;
}
.xp-label {
  font-size: 11px;
  color: var(--gray-dark);
  text-align: right;
  margin-top: 2px;
}

/* Section Header in path */
.section-header {
  text-align: center;
  padding: 20px 0 8px;
}
.section-header h2 {
  display: inline-block;
  background: var(--green);
  color: white;
  font-size: 16px;
  font-weight: 800;
  padding: 8px 24px;
  border-radius: 20px;
  box-shadow: var(--shadow) var(--green-dark);
}

/* Study Path */
.path-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 0 100px;
  -webkit-overflow-scrolling: touch;
}

.path-row {
  display: flex;
  justify-content: center;
  padding: 8px 0;
  position: relative;
}

.path-node {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 800;
  color: white;
  position: relative;
  cursor: pointer;
  transition: transform 0.15s;
  border: none;
  outline: none;
}
.path-node:active { transform: scale(0.92); }

.path-node.completed {
  background: var(--gold);
  box-shadow: var(--shadow) #d4a600;
}
.path-node.current {
  background: var(--green);
  box-shadow: var(--shadow) var(--green-dark);
  animation: pulse 2s infinite;
}
.path-node.locked {
  background: var(--gray-light);
  box-shadow: var(--shadow) #ccc;
  color: var(--gray);
  cursor: default;
}

.path-node .stars {
  position: absolute;
  bottom: -6px;
  display: flex;
  gap: 2px;
}
.path-node .stars span {
  font-size: 12px;
}

.node-label {
  font-size: 12px;
  color: var(--gray-dark);
  text-align: center;
  margin-top: 2px;
  font-weight: 600;
}

/* Path connector line */
.path-connector {
  width: 4px;
  height: 24px;
  background: var(--gray-light);
  margin: 0 auto;
  border-radius: 2px;
}
.path-connector.done {
  background: var(--gold);
}

@keyframes pulse {
  0%, 100% { box-shadow: var(--shadow) var(--green-dark), 0 0 0 0 rgba(88,204,2,0.4); }
  50% { box-shadow: var(--shadow) var(--green-dark), 0 0 0 12px rgba(88,204,2,0); }
}

/* ===== LESSON SCREEN ===== */
#lessonScreen {
  background: var(--white);
}

.lesson-header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 12px;
}

.lesson-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--gray-light);
  background: none;
  font-size: 18px;
  color: var(--gray);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.lesson-progress {
  flex: 1;
  height: 12px;
  background: var(--gray-light);
  border-radius: 6px;
  overflow: hidden;
}
.lesson-progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 6px;
  transition: width 0.4s ease;
}

.lesson-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 24px;
  overflow-y: auto;
}

/* ===== MASCOT ===== */
.mascot {
  width: 100px;
  height: 100px;
  margin-bottom: 12px;
}
.mascot-small {
  width: 64px;
  height: 64px;
}

/* ===== EXERCISE: CHARACTER INTRO ===== */
.intro-card {
  text-align: center;
  animation: fadeInUp 0.4s ease;
}
.intro-char {
  font-size: 120px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.1;
  margin: 8px 0;
}
.intro-pinyin {
  font-size: 22px;
  color: var(--blue);
  font-weight: 600;
  letter-spacing: 1px;
  margin-top: 4px;
}
.intro-meaning {
  font-size: 20px;
  color: var(--gray-dark);
  margin-bottom: 4px;
}
.intro-emoji {
  font-size: 64px;
  margin: 12px 0;
}
.tap-hint {
  font-size: 14px;
  color: var(--gray);
  margin-top: 8px;
  animation: fadeInOut 2s infinite;
}

/* ===== EXERCISE: MULTIPLE CHOICE ===== */
.question-text {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  text-align: center;
  margin: 16px 0;
}
.question-prompt {
  font-size: 18px;
  color: var(--gray-dark);
  text-align: center;
  margin-bottom: 12px;
}

.choices {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 340px;
}
.choice-btn {
  width: 100%;
  padding: 16px 20px;
  font-size: 24px;
  font-weight: 700;
  background: var(--white);
  border: 2px solid var(--gray-light);
  border-radius: var(--radius);
  box-shadow: 0 3px 0 var(--gray-light);
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text);
  text-align: center;
}
.choice-btn:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 var(--gray-light);
}
.choice-btn.correct {
  border-color: var(--green);
  background: #e8f5e9;
  box-shadow: 0 3px 0 var(--green-dark);
  color: var(--green-dark);
}
.choice-btn.wrong {
  border-color: var(--red);
  background: #ffebee;
  box-shadow: 0 3px 0 #d32f2f;
  color: var(--red);
}

/* Emoji choices (for picture matching) */
.choices-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 340px;
}
.choice-emoji-btn {
  padding: 20px;
  font-size: 48px;
  background: var(--white);
  border: 3px solid var(--gray-light);
  border-radius: var(--radius);
  box-shadow: 0 3px 0 var(--gray-light);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.choice-emoji-btn:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 var(--gray-light);
}
.choice-emoji-btn.correct {
  border-color: var(--green);
  background: #e8f5e9;
}
.choice-emoji-btn.wrong {
  border-color: var(--red);
  background: #ffebee;
}

/* ===== EXERCISE: WORD MATCH ===== */
.word-display {
  font-size: 48px;
  font-weight: 800;
  color: var(--text);
  text-align: center;
  margin: 16px 0;
  letter-spacing: 4px;
}

/* ===== BOTTOM ACTION BAR ===== */
.action-bar {
  padding: 16px 24px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  background: var(--white);
}

.action-btn {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 800;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.action-btn:active {
  transform: translateY(3px);
}

.btn-green {
  background: var(--green);
  color: white;
  box-shadow: 0 4px 0 var(--green-dark);
}
.btn-green:active { box-shadow: 0 1px 0 var(--green-dark); }

.btn-blue {
  background: var(--blue);
  color: white;
  box-shadow: 0 4px 0 var(--blue-dark);
}

.btn-disabled {
  background: var(--gray-light);
  color: var(--gray);
  box-shadow: 0 4px 0 #ccc;
  pointer-events: none;
}

/* ===== FEEDBACK BANNER ===== */
.feedback-bar {
  display: none;
  padding: 16px 24px;
  align-items: center;
  gap: 12px;
}
.feedback-bar.show { display: flex; }
.feedback-bar.correct-fb {
  background: #e8f5e9;
}
.feedback-bar.wrong-fb {
  background: #ffebee;
}
.feedback-icon { font-size: 28px; }
.feedback-text {
  font-size: 18px;
  font-weight: 700;
}
.feedback-bar.correct-fb .feedback-text { color: var(--green-dark); }
.feedback-bar.wrong-fb .feedback-text { color: var(--red); }

/* ===== COMPLETE SCREEN ===== */
#completeScreen {
  background: linear-gradient(180deg, #fff9c4 0%, #ffffff 50%);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

.complete-stars {
  font-size: 48px;
  margin: 16px 0;
  animation: bounceIn 0.6s ease;
}
.complete-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
}
.complete-subtitle {
  font-size: 16px;
  color: var(--gray-dark);
  margin-bottom: 24px;
}
.complete-xp {
  display: inline-block;
  background: var(--gold);
  color: white;
  font-size: 20px;
  font-weight: 800;
  padding: 8px 24px;
  border-radius: 20px;
  margin-bottom: 32px;
}

/* ===== CONFETTI ===== */
.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 999;
}
.confetti-piece {
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInOut {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
@keyframes bounceIn {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== AUDIO BUTTON ===== */
.audio-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--blue);
  border: none;
  box-shadow: 0 3px 0 var(--blue-dark);
  color: white;
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 8px auto;
  transition: transform 0.15s;
}
.audio-btn:active {
  transform: translateY(2px) scale(0.95);
  box-shadow: 0 1px 0 var(--blue-dark);
}

/* ===== READING / STORY SCREEN ===== */
#readingScreen { background: #fffde7; }
.reading-header {
  display: flex; align-items: center; padding: 12px 16px; gap: 12px;
  background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex-shrink: 0;
}
.reading-title { flex: 1; font-size: 16px; font-weight: 800; color: var(--text); text-align: center; }
.story-scroll { flex: 1; overflow-y: auto; padding: 20px 24px 12px; -webkit-overflow-scrolling: touch; }
.story-title { font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 20px; color: var(--text); }
.story-body { font-size: 22px; line-height: 2.2; color: var(--text); }
.story-body p { margin-bottom: 12px; }
.sentence-item { font-size: 22px; line-height: 2; margin-bottom: 12px; padding: 10px 14px;
  background: white; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
.sentence-num { color: var(--blue); font-weight: 800; margin-right: 6px; }
.story-char { display: inline; }
.story-char.highlight { background: #ffe082; border-radius: 3px; }
.recording-bar {
  flex-shrink: 0; padding: 12px 20px 20px; background: white;
  border-top: 2px solid var(--gray-light);
}
.rec-controls { display: flex; gap: 14px; justify-content: center; align-items: center; margin: 8px 0; }
.rec-btn {
  width: 58px; height: 58px; border-radius: 50%; border: none; font-size: 26px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; color: white;
}
.rec-btn:active { transform: scale(0.9); }
.rec-btn:disabled { opacity: 0.35; pointer-events: none; }
.rec-btn.btn-listen { background: var(--blue); box-shadow: 0 3px 0 var(--blue-dark); }
.rec-btn.btn-record { background: var(--red); box-shadow: 0 3px 0 #cc0000; }
.rec-btn.btn-record.recording { background: #880000; animation: recPulse 1s infinite; }
.rec-btn.btn-record.paused { background: #cc6600; animation: recPulse 1.5s infinite; }
.rec-btn.btn-listen.speaking { background: #1565c0; animation: recPulse 1.2s infinite; }
.rec-btn.btn-play { background: var(--green); box-shadow: 0 3px 0 var(--green-dark); }
.rec-btn.btn-save { background: var(--gold); box-shadow: 0 3px 0 #c49a00; }
@keyframes recPulse { 0%,100%{box-shadow:0 3px 0 #cc0000,0 0 0 0 rgba(255,75,75,0.5)} 50%{box-shadow:0 3px 0 #cc0000,0 0 0 10px rgba(255,75,75,0)} }
.rec-status { text-align: center; font-size: 13px; color: var(--gray-dark); min-height: 18px; }
.rec-timer { text-align: center; font-size: 24px; font-weight: 800; color: var(--red); min-height: 32px; }
.saved-list { margin-top: 10px; max-height: 120px; overflow-y: auto; }
.saved-item {
  display: flex; align-items: center; gap: 10px; padding: 7px 0;
  border-bottom: 1px solid #f0f0f0; font-size: 13px; color: var(--gray-dark);
}
.saved-play-btn {
  padding: 4px 10px; background: var(--blue); color: white;
  border: none; border-radius: 8px; font-size: 12px; cursor: pointer;
}
/* complete screen read-story btn */
.btn-read { background: var(--purple); color: white; box-shadow: 0 4px 0 #a855f7; }
.read-path-btn {
  margin-top: 4px; padding: 4px 12px;
  background: var(--purple); color: white;
  border: none; border-radius: 12px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  box-shadow: 0 2px 0 #a855f7;
}

/* ===== PARENT MODE MODAL ===== */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; background: rgba(0,0,0,0.5);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  background: var(--white); border-radius: 24px 24px 0 0;
  width: 100%; max-height: 85vh; display: flex; flex-direction: column;
  max-width: 480px; animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); } to { transform: translateY(0); }
}
.modal-header {
  padding: 20px 20px 12px; border-bottom: 1px solid var(--gray-light);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-title { font-size: 18px; font-weight: 800; color: var(--text); }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: var(--gray-light); font-size: 16px; cursor: pointer;
}
.modal-body {
  flex: 1; overflow-y: auto; padding: 12px 20px 40px;
  -webkit-overflow-scrolling: touch;
}
.modal-section-title {
  font-size: 12px; font-weight: 700; color: var(--gray-dark);
  text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px;
}
.btn-danger {
  width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
  background: #fff0f0; border: 2px solid var(--red);
  border-radius: var(--radius); color: var(--red); cursor: pointer;
}
.book-label {
  font-size: 13px; font-weight: 800; color: white; background: var(--green);
  display: inline-block; padding: 3px 10px; border-radius: 10px; margin: 12px 0 6px;
}
.lesson-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid #f0f0f0;
}
.lesson-info { flex: 1; min-width: 0; }
.lesson-row-title { font-size: 13px; font-weight: 700; color: var(--text); }
.lesson-chars-preview {
  font-size: 15px; color: var(--gray-dark);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
}
.jump-btn {
  flex-shrink: 0; padding: 6px 12px; font-size: 12px; font-weight: 700;
  background: var(--blue); color: white; border: none;
  border-radius: 10px; cursor: pointer; box-shadow: 0 2px 0 var(--blue-dark);
}
/* ===== TREASURE BOX ===== */
.treasure-node {
  width: 72px; height: 72px; border-radius: 18px;
  font-size: 32px; cursor: pointer; border: none; outline: none;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s; position: relative;
}
.treasure-node.available {
  background: var(--gold);
  box-shadow: 0 4px 0 #c49a00;
  animation: treasurePulse 1.5s infinite;
}
.treasure-node.opened {
  background: var(--gray-light);
  box-shadow: 0 4px 0 #ccc;
  cursor: default;
}
.treasure-node.locked {
  background: var(--gray-light);
  box-shadow: 0 4px 0 #ccc;
  cursor: default; filter: grayscale(1); opacity: 0.6;
}
.treasure-node:active { transform: scale(0.92); }
@keyframes treasurePulse {
  0%,100% { box-shadow: 0 4px 0 #c49a00, 0 0 0 0 rgba(255,200,0,0.5); }
  50% { box-shadow: 0 4px 0 #c49a00, 0 0 0 14px rgba(255,200,0,0); }
}
.jump-here-btn {
  display: block; margin: 0 auto 4px;
  padding: 5px 16px; font-size: 12px; font-weight: 700;
  border: none; border-radius: 20px; cursor: pointer;
  background: rgba(255,255,255,0.85); color: var(--text);
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
}
/* ===== TREASURE REWARD OVERLAY ===== */
.treasure-overlay {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; background: rgba(0,0,0,0.6);
  z-index: 300; align-items: center; justify-content: center;
}
.treasure-overlay.show { display: flex; }
.treasure-popup {
  background: linear-gradient(160deg,#fffde7,#fff9c4);
  border-radius: 24px; padding: 40px 32px; text-align: center;
  max-width: 320px; width: 90%; animation: bounceIn 0.5s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.treasure-popup .t-icon { font-size: 72px; margin-bottom: 8px; }
.treasure-popup .t-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
.treasure-popup .t-amount { font-size: 44px; font-weight: 900; color: var(--gold); margin: 8px 0 20px; }

.parent-btn {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--gray-light);
  background: none; font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: var(--gray-dark);
}

/* ===== SCROLLBAR HIDE ===== */
.path-container::-webkit-scrollbar { display: none; }
.path-container { -ms-overflow-style: none; scrollbar-width: none; }

/* ===== RESPONSIVE ===== */
@media (min-width: 480px) {
  .screen { max-width: 480px; margin: 0 auto; left: 50%; transform: translateX(-50%); }
}
</style>
</head>
<body>

<!-- ===== HOME SCREEN ===== -->
<div id="homeScreen" class="screen active">
  <div class="home-header">
    <div class="home-title">🐷 小猪猪学中文</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="streak-badge">🔥 <span id="streakCount">0</span>天</div>
      <button class="parent-btn" onclick="openParentMode()">⚙️</button>
    </div>
  </div>

        story:{ title:"大拇指生气了", text:"一只手有五个手指：大拇指、食指、中指、无名指，还有小指。\n\n左手和右手加起来，一共有十个手指。大家在一起很快乐，做什么事都是你帮我，我帮他，做得都很好。\n\n有一天，大拇指生了气，它大声对食指、中指、无名指和小指说：\n\n\"你们不要再来找我，做事不要找我。玩，也不要来找我。\"\n\n大家看大拇指生了这么大的气，也不敢找它。到了吃饭时，它还在生气。\n\n不好了，大拇指不和大家一起做事，就什么东西也拿不到手上。\n\n饭也吃不到口里。吃不到东西，大家只好饿肚子了。" }

        story:{title:"小老鼠救狮子",text:"在大草原上，一头狮子正在睡觉。一只老鼠从这里走过，还在狮子头上的毛里坐了一会儿。\n\n\"是谁！\"狮子醒了，生气地一把捉住了老鼠：\"原来是你。也好，正好做我的午饭。\"\n\n老鼠哭着求狮子：\"放了我吧，我还有七个孩子在家等着我呢！你要是放了我，我会好好谢你，我是不会说假话的。\"\n\n狮子想了想，想到老鼠的七个孩子还在等妈妈，就把老鼠放掉了。\n\n过了一天，狮子出来找吃的东西。\n\n\"好香呀！\"狮子走过去，看见地上有一堆肉。正想去拿，一张大网一下子网住了它。动也不能动。狮子急得又喊又叫。\n\n这时，正好鼠妈妈和她的孩子们从这儿走过。\n\n\"呀！狮子大哥，你怎么在这里面呀？只有我能救你了。来！孩子们，我们一起来咬开这张网。\"\n\n咬啊，咬啊，老鼠妈妈和小老鼠们把大网咬开了。狮子从里面跳了出来。\n\n\"谢谢你，老鼠太太。谢谢你们，老鼠小朋友。\""}

        story:{title:"大灰狼拔牙",text:"大灰狼的牙痛，它就去找大猩猩。大猩猩问它：\"你怎么啦？\"\n\n大灰狼说：\"我的牙痛得很，咬不动东西，天天都觉得肚子饿。很不好过。怎么办呢？\"\n\n大猩猩说：\"我来给你拔掉吧！\"\n\n大灰狼说：\"怎么拔呢？\"\n\n大猩猩想了想，说：\"是呀！用什么东西拔呢？\"\n\n正在这时，小猴子来了，大猩猩就请小猴子帮着想。\n\n小猴子想了想，说：\"有了。\"就去拿了一块石头，叫大灰狼用力咬。\n\n大灰狼不敢咬，说：\"你这哪里是给我拔牙，你是在害我呀！\"\n\n小猴子听了，回头就走。大猩猩也要走了。\n\n大灰狼着急了，想快把痛的牙拔了去，好去找东西吃。\n\n\"好吧，好吧。我咬，我咬。是不是能拔掉呢？\"\n\n小猴子说：\"你要用最大的力气咬，不用力是拔不掉的。\"\n\n大灰狼就用了最大的力气，大口一咬。\n\n\"啊呀！啊呀！不得了啦，好痛呀！\"大灰狼一边喊，一边叫，一边跳。原来，大灰一嘴的牙都咬掉了。\n\n大灰狼再也吃不了肉了，再也没有谁怕它了。"}

        story:{title:"山羊爷爷的胡子",text:"山羊爷爷有一大把漂亮的胡子，它天天都对它的朋友们说：\"谁也没有我这么漂亮的胡子。狮子没有，老虎没有，老狼也没有。只有我山羊爷爷有。哈哈！你们是不是很想学我，也贴上一把胡子呢？\"\n\n狮子、老虎、老狼都在想：\"是啊，我们是没有山羊爷爷那么一大把漂亮的胡子。\"不过，谁也没想去贴胡子。\n\n可是，山羊爷爷的儿子对山羊爷爷说：\"老爸，你的胡子是很漂亮，我的胡子也很好看。可是，我的儿子小山羊天天哭。他说，他的小朋友们都在笑话他。大家都问他，你这么小，怎么就长了胡子呢？我不知道怎么说，他才不会哭，才能高兴起来？\"\n\n山羊爷爷想了又想：\"是呀，他这么小怎么也会长胡子呢？\"想来想去，山羊爷爷还是没有想明白。"}

        story:{title:"画妈妈",text:"妈妈才出去了一会儿，小花就想妈妈了。\n\n\"我数一、二、三，妈妈就回来了。\"小花伸出三个手指头。\n\n\"一——\"，小花数了个长长的\"一\"，听一听，没有妈妈走路的声音。\n\n\"二——\"，小花数了个更长的\"二\"，听一听，没有妈妈叫门的声音。\n\n\"三——\"，小花数了个更长更长的\"三\"，她走到门口，用耳朵贴着门听，还是没有声音。\n\n妈妈没有回来，小花真想妈妈啊！\n\n\"我来画个妈妈吧，等我画好了，妈妈就回来了。\"小花拿出了纸和笔，先画了个很大的圆圈，小花亲了它一下：\"这是妈妈的脸。\"\n\n小花又在很大的圆圈里画上两个不大不小的圆圈，小花又亲了它们：\"这是妈妈的眼睛。\"\n\n接着，小花在不大不小的圆圈下面，画上一个小小的圆圈，小花亲了它一下：\"这是妈妈的嘴巴。\"\n\n正在这时，妈妈在门外喊小花了。妈妈回来啦，妈妈真的回来啦！\n\n\"妈妈，妈妈，我数一、二、三，你不回来。我亲亲你的脸，你就回来啦！\""}

        story:{title:"笨鸟先飞",text:"鸟妈妈有好多个孩子。孩子们都很聪明，只有最小的鸟弟弟很笨。大家都叫它\"小笨笨\"。\n\n鸟妈妈和哥哥、姐姐们都对小笨笨很好，什么事都帮着它做。\n\n可是，笨笨什么事都想自己去做。\n\n\"你们不要帮我。你们总是帮我，我就什么事也不会做了。只有自己学，才能学会。\"\n\n鸟妈妈想：\"对呀！到了学飞时，大家再帮它，也不能帮它飞，它总得自己飞呀。\"\n\n从那以后，很多事，鸟妈妈不再帮笨笨做，也不叫哥哥、姐姐帮它做。慢慢地，笨笨自己学会了做很多事。\n\n要学飞了。飞是很难学的。飞不好，会从天上摔下来，很痛很痛。\n\n\"笨笨能学会吗？\"鸟妈妈心里很着急。\n\n\"妈妈放心，我会多多地练习飞。我不怕摔，也不怕痛。我一定能学会的。请妈妈放心！\"笨笨说。\n\n从那以后，每天早上，笨笨都是最早一个起来。哥哥、姐姐还在睡觉、做梦时，妈妈就带着它一起练飞了。\n\n天天练，天天练，不知摔下来多少回，笨笨没有哭，没有喊，它很勇敢。鸟妈妈心里很高兴：\"笨笨一定能学会，还能飞得很好。\"\n\n真的，到了鸟妈妈叫大家一起飞的那天，小笨笨飞得最快，飞得最好，飞得最漂亮。\n\n笨笨笑了，妈妈笑了，哥哥、姐姐也笑了。"}

        words:["闪闪","闪光","闪电","金色","金子","金鱼","美好","美丽","美人","美术","当时","当中","当心","扇子","电扇","风扇","满意","满月","满天","充满","干净","干活","能干","干旱"],
        story:{title:"数星星",text:"夏天的晚上，毛毛和爸爸坐在门外草地上，抬头看天上的星星。\n\n\"数数看，看能数出多少颗星星。\"毛毛心里想。\n\n\"一、二、三、四、五……\"一下子就数错了。\"再从头数吧！\"\n\n\"一、二、三、四、五、六……\"又数错了。\n\n天上怎么有这么多星星，数来数去也数不清。\n\n\"爸爸，请你告诉我星星的事，好吗？\"\n\n\"好的。我们住的地球，还有土星、木星、水星、太阳、月亮啊，都是星球……\"\n\n\"太阳、月亮又不是星球！\"\n\n\"它们同样是星球。只是因为离我们太近，看起来就不像天上的星星那样小。\"\n\n\"那些星球上有人住吗？\"\n\n\"可能还没有。\"\n\n\"我想上去住。\"\n\n\"是啊！我们地球上住的人太多了，快要住不下了。不过，哪颗星球上可以住人，我们还不知道。\"\n\n\"等我长大了，我会坐着飞船到天上去。看看哪颗星球可以住人。等我找到了，我会回来接你和妈妈一起去住。\"\n\n\"好啊，好啊！我和妈妈会等着你来接我们。不过，学习不好的孩子是去不了的。\"\n\n\"爸爸放心，为了找到这颗星球，我也会好好学习的。\""}

        story:{title:"宝宝读短文",text:"我爱画蓝蓝的天，白白的云，红红的太阳闪金光。我爱画绿绿的青草，美丽的花朵，小鸟在树上歌唱。我爱画可爱的小白兔，聪明的小猴子，长着胡子的山羊。我还爱画我的爷爷、奶奶、爸爸、妈妈和好朋友方方。我长大了要把画家当。\n\n下雪了，大地一片雪白。会画梅花的小狗在雪地上跑，会画竹叶的小鸡在雪地上跑，会画扇子的小鸭在雪地上跑，会画月牙的小马也在雪地上跑。跑呀跑，画呀画，一边跑，一边画。雪地上画满了梅花、竹叶、扇子和月牙。大家笑着说：\"哈哈哈，哈哈哈，我们都是小画家。不用笔，不用纸，画得满地都是画。\"\n\n面向着北方，背朝着南方。右手指着东，左手指着西。面向着东方，背朝着西方。右手指着南，左手指着北。面向着南方，背朝着北方。右手指着西，左手指着东。面向着西方，背朝着东方。右手指着北，左手指着南。"}

// STATE
// ===================================================================
let state = loadState();

function defaultState() {
  return {
    xp: 0,
    streak: 0,
    lastDate: null,
    lessons: {},
    treasures: {},
    unlockedBooks: {} // { "bookId": true } when jumped to via button
  };
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('chineseTutor'));
    return s || defaultState();
  } catch { return defaultState(); }
}

function saveState() {
  localStorage.setItem('chineseTutor', JSON.stringify(state));
}

function getLessonKey(bookId, lessonId) {
  return `${bookId}-${lessonId}`;
}

function isLessonCompleted(bookId, lessonId) {
  return state.lessons[getLessonKey(bookId, lessonId)]?.completed || false;
}

function getLessonStars(bookId, lessonId) {
  return state.lessons[getLessonKey(bookId, lessonId)]?.stars || 0;
}

function isLessonUnlocked(bookId, lessonId) {
  if (bookId === 1 && lessonId === 1) return true;
  const book = BOOKS.find(b => b.id === bookId);
  const idx = book.lessons.findIndex(l => l.id === lessonId);
  // First lesson of this book — also unlock if jumped to via button
  if (idx === 0 && state.unlockedBooks && state.unlockedBooks[bookId]) return true;
  // Previous lesson in same book
  if (idx > 0) {
    return isLessonCompleted(bookId, book.lessons[idx - 1].id);
  }
  // First lesson of next book — need last lesson of prev book
  const prevBook = BOOKS.find(b => b.id === bookId - 1);
  if (prevBook) {
    const lastLesson = prevBook.lessons[prevBook.lessons.length - 1];
    return isLessonCompleted(prevBook.id, lastLesson.id);
  }
  return false;
}

// ===================================================================
// SPEECH
// ===================================================================
let _zhVoice = null;
// Priority: neural/online > enhanced > standard. Covers Windows, macOS, iOS, Chrome
const _voicePriority = [
  // Microsoft neural (Windows/Edge)
  'Xiaoxiao Online', 'Xiaoyi Online', 'Xiaochen Online', 'Yunxi Online',
  'Xiaoxiao Natural', 'Xiaoyi Natural',
  '晓晓', '晓伊', '晓辰', '云希',
  'Xiaoxiao', 'Xiaoyi', 'Xiaochen', 'Yunxi',
  // iOS / macOS — female voices preferred for kids
  'Tian-Tian', 'Tian-tian',         // iOS zh-CN female (best iOS voice)
  'Yu-shu',                          // iOS zh-CN female
  'Li-mu',                           // iOS zh-CN male
  'Ting-Ting', 'Meijia', 'Lili',    // macOS
  // Google (Chrome on Android/desktop)
  'Google 普通话', 'Google Chinese (Simplified)',
  // Fallbacks
  'Huihui', 'Kangkang'
];

function _pickVoice() {
  if (!window.speechSynthesis) return;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return false;
  const zh = voices.filter(v => v.lang && (v.lang.startsWith('zh') || v.lang.startsWith('cmn')));
  if (!zh.length) return false;
  // Priority matching
  for (const name of _voicePriority) {
    const v = zh.find(v => v.name.includes(name));
    if (v) { _zhVoice = v; return true; }
  }
  // Prefer any neural/enhanced voice
  const neural = zh.find(v => /Online|Natural|Enhanced|Premium/i.test(v.name));
  if (neural) { _zhVoice = neural; return true; }
  // Prefer zh-CN
  const cn = zh.find(v => v.lang === 'zh-CN' || v.lang === 'zh_CN');
  _zhVoice = cn || zh[0];
  return true;
}

// Robust voice init: Safari doesn't support onvoiceschanged, iOS returns empty initially
(function initVoices() {
  if (!window.speechSynthesis) return;
  // Try immediately
  if (_pickVoice()) return;
  // Listen for voiceschanged (Chrome, Edge, Firefox)
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = _pickVoice;
  }
  // Polling fallback for Safari/iOS (tries for up to 5 seconds)
  let attempts = 0;
  const poll = setInterval(() => {
    attempts++;
    if (_pickVoice() || attempts >= 25) clearInterval(poll);
  }, 200);
})();

// Helper: create a configured utterance
function _makeUtterance(text, rate, pitch) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  if (_zhVoice) u.voice = _zhVoice;
  u.rate = rate || 0.78;
  u.pitch = pitch || 1.05;
  u.volume = 1.0;
  return u;
}

// Context-aware speaking: single chars spoken slowly and repeated
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const isSingleChar = text.length === 1;
  const isWord = text.length >= 2 && text.length <= 4;
  if (isSingleChar) {
    const u = _makeUtterance(text, 0.6, 1.05);
    u.onend = () => {
      setTimeout(() => {
        window.speechSynthesis.speak(_makeUtterance(text, 0.85, 1.0));
      }, 400);
    };
    window.speechSynthesis.speak(u);
  } else if (isWord) {
    window.speechSynthesis.speak(_makeUtterance(text, 0.7, 1.05));
  } else {
    window.speechSynthesis.speak(_makeUtterance(text, 0.78, 1.05));
  }
}

// ===================================================================
// CHUNKED STORY READING (works on iOS Safari — no pause/resume API)
// ===================================================================
// Splits text into sentence-sized chunks and plays them sequentially.
// "Pause" = stop after current chunk. "Resume" = continue from next chunk.
let _storyChunks = [];
let _storyChunkIdx = 0;
let _storyPlaying = false;
let _storyPaused = false;

function _splitIntoChunks(text) {
  // Split on Chinese punctuation and newlines into natural sentence chunks
  const raw = text.split(/([。！？；\n]+)/);
  const chunks = [];
  for (let i = 0; i < raw.length; i += 2) {
    const sentence = (raw[i] || '') + (raw[i + 1] || '');
    const trimmed = sentence.trim();
    if (trimmed) chunks.push(trimmed);
  }
  // If no punctuation found, split into ~30 char segments at commas
  if (chunks.length <= 1 && text.length > 30) {
    const fallback = text.split(/([，,、]+)/);
    const result = [];
    let buf = '';
    for (let i = 0; i < fallback.length; i++) {
      buf += fallback[i];
      if (buf.length >= 20 || i === fallback.length - 1) {
        if (buf.trim()) result.push(buf.trim());
        buf = '';
      }
    }
    return result.length ? result : [text];
  }
  return chunks.length ? chunks : [text];
}

function _playNextChunk() {
  if (!_storyPlaying || _storyPaused) return;
  if (_storyChunkIdx >= _storyChunks.length) {
    // All done
    _storyPlaying = false;
    _storyPaused = false;
    const btn = document.getElementById('listenBtn');
    if (btn) { btn.textContent = '🔊'; btn.className = 'rec-btn btn-listen'; }
    state.xp += 3;
    document.getElementById('xpLabel').textContent = state.xp;
    saveState();
    document.getElementById('recStatus').textContent = '朗读完毕！+3 💎 现在轮到你了 🎤';
    return;
  }
  const chunk = _storyChunks[_storyChunkIdx];
  const u = _makeUtterance(chunk, 0.78, 1.05);
  u.onend = () => {
    _storyChunkIdx++;
    // Small pause between sentences for natural rhythm
    setTimeout(_playNextChunk, 250);
  };
  u.onerror = () => {
    _storyChunkIdx++;
    setTimeout(_playNextChunk, 250);
  };
  window.speechSynthesis.speak(u);
}

function stopStoryReading() {
  window.speechSynthesis.cancel();
  _storyPlaying = false;
  _storyPaused = false;
  _storyChunks = [];
  _storyChunkIdx = 0;
}

// RENDER HOME (Study Path)
// ===================================================================
function renderHome() {
  showScreen('homeScreen');
  updateStreak();

  const totalXp = state.xp;
  document.getElementById('xpLabel').textContent = totalXp;
  document.getElementById('xpBarFill').style.width = `${Math.min(100, (totalXp % 100))}%`;
  document.getElementById('streakCount').textContent = state.streak;

  const container = document.getElementById('pathContainer');
  container.innerHTML = '';

  BOOKS.forEach(book => {
    // Section header with jump button
    const header = document.createElement('div');
    header.className = 'section-header';
    header.id = `book-${book.id}`;
    header.innerHTML = `
      <button class="jump-here-btn" onclick="scrollToBook(${book.id})">▶ 跳到这里</button>
      <h2 style="background:${book.color};box-shadow:0 4px 0 rgba(0,0,0,0.2)">${book.title}</h2>
    `;
    container.appendChild(header);

    // Zigzag offsets for path nodes
    const offsets = [0, -60, 0, 60, 0, -60, 0, 60, 0, -60];

    book.lessons.forEach((lesson, idx) => {
      // Connector line (skip idx===5 — treasure block already adds it)
      if (idx > 0 && idx !== 5) {
        const conn = document.createElement('div');
        conn.className = 'path-connector' + (isLessonCompleted(book.id, lesson.id) || isLessonUnlocked(book.id, lesson.id) ? ' done' : '');
        container.appendChild(conn);
      }

      // Treasure box after lesson 5 (idx === 4)
      if (idx === 5) {
        const treasure = getTreasure(book.id);
        const tUnlocked = isTreasureUnlocked(book.id);
        const tConn = document.createElement('div');
        tConn.className = 'path-connector' + (tUnlocked ? ' done' : '');
        container.appendChild(tConn);
        const tRow = document.createElement('div');
        tRow.className = 'path-row';
        const tBtn = document.createElement('button');
        const tState = treasure.opened ? 'opened' : tUnlocked ? 'available' : 'locked';
        tBtn.className = `treasure-node ${tState}`;
        tBtn.innerHTML = treasure.opened ? '💎' : '🎁';
        if (tUnlocked && !treasure.opened) tBtn.onclick = () => openTreasure(book.id);
        const tWrap = document.createElement('div');
        tWrap.style.textAlign = 'center';
        tWrap.appendChild(tBtn);
        const tLabel = document.createElement('div');
        tLabel.className = 'node-label';
        tLabel.textContent = treasure.opened ? `已获得 ${treasure.diamonds}💎` : `宝箱 🎁`;
        tWrap.appendChild(tLabel);
        tRow.appendChild(tWrap);
        container.appendChild(tRow);
        const tConn2 = document.createElement('div');
        tConn2.className = 'path-connector' + (isLessonUnlocked(book.id, lesson.id) ? ' done' : '');
        container.appendChild(tConn2);
      }

      const row = document.createElement('div');
      row.className = 'path-row';
      row.style.transform = `translateX(${offsets[idx % offsets.length]}px)`;

      const completed = isLessonCompleted(book.id, lesson.id);
      const unlocked = isLessonUnlocked(book.id, lesson.id);
      const stars = getLessonStars(book.id, lesson.id);

      const node = document.createElement('button');
      node.className = 'path-node ' + (completed ? 'completed' : unlocked ? 'current' : 'locked');
      if (unlocked && !completed) {
        node.style.background = book.color;
        node.style.boxShadow = `0 4px 0 rgba(0,0,0,0.2)`;
      }

      if (completed) {
        node.innerHTML = '✓';
      } else if (unlocked) {
        node.innerHTML = getLessonIcon(lesson.id);
      } else {
        node.innerHTML = '🔒';
      }

      // Stars
      if (completed && stars > 0) {
        const starsDiv = document.createElement('div');
        starsDiv.className = 'stars';
        for (let i = 0; i < 3; i++) {
          const s = document.createElement('span');
          s.textContent = i < stars ? '⭐' : '☆';
          starsDiv.appendChild(s);
        }
        node.appendChild(starsDiv);
      }

      if (unlocked || completed) {
        node.onclick = () => startLesson(book.id, lesson.id);
      }

      const wrapper = document.createElement('div');
      wrapper.style.textAlign = 'center';
      wrapper.appendChild(node);

      const label = document.createElement('div');
      label.className = 'node-label';
      label.textContent = lesson.title;
      wrapper.appendChild(label);

      // Reading button for lessons with story/sentence content
      if ((unlocked || completed) && (lesson.story || lesson.sentences)) {
        const readBtn = document.createElement('button');
        readBtn.className = 'read-path-btn';
        readBtn.textContent = '📖 读';
        readBtn.onclick = (e) => { e.stopPropagation(); openReadingScreen(book.id, lesson.id); };
        wrapper.appendChild(readBtn);
      }

      row.appendChild(wrapper);
      container.appendChild(row);
    });
  });
}

function getLessonIcon(id) {
  const icons = ['📖', '⭐', '🌟', '🎯', '🌸', '🌿', '🏠', '💕', '💎', '🎭'];
  return icons[(id - 1) % icons.length];
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (state.lastDate === yesterday) {
      // streak continues
    } else if (state.lastDate !== today) {
      state.streak = 0;
    }
  }
}

// ===================================================================
// LESSON ENGINE
// ===================================================================
let currentLesson = null;
let exercises = [];
let exerciseIndex = 0;
let correctCount = 0;
let totalExercises = 0;
let awaitingNext = false;
let selectedAnswer = false;

function startLesson(bookId, lessonId) {
  const book = BOOKS.find(b => b.id === bookId);
  const lesson = book.lessons.find(l => l.id === lessonId);
  currentLesson = { bookId, lessonId, lesson };

  exercises = generateExercises(lesson, book);
  exerciseIndex = 0;
  correctCount = 0;
  totalExercises = exercises.length;
  awaitingNext = false;

  showScreen('lessonScreen');
  renderExercise();
}

function generateExercises(lesson, book) {
  const ex = [];
  const chars = lesson.characters;

  // Phase 1: Introduce characters (show 2-3 at a time)
  const introGroupSize = Math.min(3, chars.length);
  for (let i = 0; i < Math.min(chars.length, 6); i++) {
    ex.push({ type: 'intro', char: chars[i] });
  }

  // Phase 2: Character → Emoji matching (pick the right emoji for the character)
  const shuffled1 = [...chars].sort(() => Math.random() - 0.5).slice(0, 4);
  shuffled1.forEach(c => {
    const distractors = chars.filter(x => x.char !== c.char).sort(() => Math.random() - 0.5).slice(0, 3);
    ex.push({
      type: 'char-to-emoji',
      target: c,
      options: shuffle([c, ...distractors])
    });
  });

  // Phase 3: Emoji → Character (hear/see emoji, pick the right character)
  const shuffled2 = [...chars].sort(() => Math.random() - 0.5).slice(0, 4);
  shuffled2.forEach(c => {
    const distractors = chars.filter(x => x.char !== c.char).sort(() => Math.random() - 0.5).slice(0, 3);
    ex.push({
      type: 'emoji-to-char',
      target: c,
      options: shuffle([c, ...distractors])
    });
  });

  // Phase 4: Word reading (if words available)
  if (lesson.words && lesson.words.length > 0) {
    const wordSample = [...lesson.words].sort(() => Math.random() - 0.5).slice(0, 3);
    wordSample.forEach(word => {
      // Pick distractors from other words
      const distractors = lesson.words.filter(w => w !== word).sort(() => Math.random() - 0.5).slice(0, 2);
      // For word exercises: hear the word, pick the right characters
      ex.push({
        type: 'word-listen',
        word: word,
        options: shuffle([word, ...distractors])
      });
    });
  }

  return ex;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderExercise() {
  if (exerciseIndex >= exercises.length) {
    completeLesson();
    return;
  }

  const ex = exercises[exerciseIndex];
  const body = document.getElementById('lessonBody');
  const progress = ((exerciseIndex) / exercises.length) * 100;
  document.getElementById('lessonProgressFill').style.width = progress + '%';

  hideFeedback();
  selectedAnswer = false;

  const btn = document.getElementById('actionBtn');

  switch (ex.type) {
    case 'intro':
      renderIntro(ex, body);
      btn.textContent = '继续';
      btn.className = 'action-btn btn-green';
      awaitingNext = true;
      break;
    case 'char-to-emoji':
      renderCharToEmoji(ex, body);
      btn.textContent = '选一选';
      btn.className = 'action-btn btn-disabled';
      awaitingNext = false;
      break;
    case 'emoji-to-char':
      renderEmojiToChar(ex, body);
      btn.textContent = '选一选';
      btn.className = 'action-btn btn-disabled';
      awaitingNext = false;
      break;
    case 'word-listen':
      renderWordListen(ex, body);
      btn.textContent = '选一选';
      btn.className = 'action-btn btn-disabled';
      awaitingNext = false;
      break;

}

function selectEmoji(btn, correct, selected) {
  if (selectedAnswer) return;
  selectedAnswer = true;
  handleAnswer(btn, correct === selected, correct, 'emoji');
}

function selectChar(btn, correct, selected) {
  if (selectedAnswer) return;
  selectedAnswer = true;
  handleAnswer(btn, correct === selected, correct, 'char');
}

function selectWord(btn, correct, selected) {
  if (selectedAnswer) return;
  selectedAnswer = true;
  handleAnswer(btn, correct === selected, correct, 'word');
}

function handleAnswer(btn, isCorrect, correctAnswer, type) {
  const grid = document.getElementById('choicesGrid');
  const buttons = grid.querySelectorAll('button');

  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    showFeedback(true, '太棒了！');
    speak(correctAnswer);
    buttons.forEach(b => b.style.pointerEvents = 'none');
    const actionBtn = document.getElementById('actionBtn');
    actionBtn.textContent = '继续';
    actionBtn.className = 'action-btn btn-green';
    awaitingNext = true;
  } else {
    // Disable all buttons briefly, flash wrong
    buttons.forEach(b => b.style.pointerEvents = 'none');
    btn.classList.add('wrong');
    showFeedback(false, '再试试！');
    speak(correctAnswer);
    // Re-enable after 1s so user can retry
    setTimeout(() => {
      btn.classList.remove('wrong');
      btn.style.pointerEvents = '';
      buttons.forEach(b => b.style.pointerEvents = '');
      hideFeedback();
      selectedAnswer = false;
    }, 1000);
  }
}

function showFeedback(correct, text) {
  const bar = document.getElementById('feedbackBar');
  const icon = document.getElementById('feedbackIcon');
  const txt = document.getElementById('feedbackText');

  bar.className = 'feedback-bar show ' + (correct ? 'correct-fb' : 'wrong-fb');
  icon.textContent = correct ? '✅' : '❌';
  txt.textContent = text;
}

function hideFeedback() {
  document.getElementById('feedbackBar').className = 'feedback-bar';
}

function handleAction() {
  if (awaitingNext) {
    exerciseIndex++;
    renderExercise();

}

// ===================================================================
// LESSON COMPLETE
// ===================================================================
function completeLesson() {
  const accuracy = correctCount / Math.max(1, totalExercises - currentLesson.lesson.characters.length);
  // Characters.length = intro slides which don't count as "correct/wrong"
  const quizCount = totalExercises - Math.min(currentLesson.lesson.characters.length, 6);
  const quizAccuracy = correctCount / Math.max(1, quizCount);

  let stars = 1;
  if (quizAccuracy >= 0.9) stars = 3;
  else if (quizAccuracy >= 0.7) stars = 2;

  const xpEarned = stars; // 1x diamonds for listening (1-3 based on stars)

  const key = getLessonKey(currentLesson.bookId, currentLesson.lessonId);
  const prev = state.lessons[key];
  if (!prev || prev.stars < stars) {
    state.lessons[key] = { completed: true, stars };
  } else {
    state.lessons[key].completed = true;
  }

  state.xp += xpEarned;
  const today = new Date().toDateString();
  if (state.lastDate !== today) {
    state.streak++;
    state.lastDate = today;
  }
  saveState();

  // Show complete screen
  const starEmojis = ['', '⭐', '⭐⭐', '⭐⭐⭐'];
  document.getElementById('completeStars').textContent = starEmojis[stars];
  document.getElementById('completeSubtitle').textContent = `${currentLesson.lesson.title} 完成了！`;
  document.getElementById('completeXp').textContent = `+${xpEarned} 💎`;

  // Show 读故事 button if this lesson has a story or sentences
  const hasReading = currentLesson.lesson.story || currentLesson.lesson.sentences;
  document.getElementById('readStoryBtn').style.display = hasReading ? 'block' : 'none';

  showScreen('completeScreen');
  launchConfetti();
  speak('太棒了');
}

function exitLesson() {
  goHome();
}

  renderHome();
}

function toggleListenStory() {
  const btn = document.getElementById('listenBtn');
  if (_storyPaused) {
    // Resume from where we left off
    _storyPaused = false;
    _storyPlaying = true;
    btn.textContent = '⏸';
    btn.className = 'rec-btn btn-listen speaking';
    document.getElementById('recStatus').textContent = `🔊 正在朗读... (${_storyChunkIdx + 1}/${_storyChunks.length})`;
    _playNextChunk();
    return;
  }
  if (_storyPlaying) {
    // Pause: cancel current utterance, remember position
    window.speechSynthesis.cancel();
    _storyPaused = true;
    _storyPlaying = false;
    btn.textContent = '▶';
    btn.className = 'rec-btn btn-listen';
    document.getElementById('recStatus').textContent = `⏸ 朗读已暂停 (${_storyChunkIdx + 1}/${_storyChunks.length})，点击 ▶ 继续`;
    return;
  }
  // Start fresh: split text into chunks
  const lesson = currentReading.lesson;
  const text = lesson.story ? lesson.story.text.replace(/\n/g, '') : lesson.sentences ? lesson.sentences.join('。') : '';
  if (!text) return;
  _storyChunks = _splitIntoChunks(text);
  _storyChunkIdx = 0;
  _storyPlaying = true;
  _storyPaused = false;
  btn.textContent = '⏸';
  btn.className = 'rec-btn btn-listen speaking';
  document.getElementById('recStatus').textContent = `🔊 正在朗读... (1/${_storyChunks.length})`;
  _playNextChunk();
}

async function toggleRecording() {
  const btn = document.getElementById('recordBtn');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    // Pause recording
    mediaRecorder.pause();
    clearInterval(recTimer);
    btn.textContent = '▶';
    btn.className = 'rec-btn btn-record paused';
    document.getElementById('recStatus').textContent = '⏸ 录音已暂停 · 点击 ▶ 继续，长按 ⏹ 停止';
    return;
  }
  if (mediaRecorder && mediaRecorder.state === 'paused') {
    // Resume recording
    mediaRecorder.resume();
    recTimer = setInterval(() => {
      recSeconds++;
      document.getElementById('recTimer').textContent = formatTime(recSeconds);
    }, 1000);
    btn.textContent = '⏸';
    btn.className = 'rec-btn btn-record recording';
    document.getElementById('recStatus').textContent = '🔴 录音中... 点击暂停，双击停止';
    return;
  }
  // Start new recording
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recChunks = []; recSeconds = 0;
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => recChunks.push(e.data);
    mediaRecorder.onstop = () => {
      recBlob = new Blob(recChunks, { type: 'audio/webm' });
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('recStatus').textContent = '录音完成！可以播放或下载 💾';
      document.getElementById('recTimer').textContent = formatTime(recSeconds);
      document.getElementById('playBtn').disabled = false;
      document.getElementById('saveBtn').disabled = false;
      btn.textContent = '⏺';
      btn.className = 'rec-btn btn-record';
    };
    mediaRecorder.start(1000); // timeslice for reliable chunks
    recTimer = setInterval(() => {
      recSeconds++;
      document.getElementById('recTimer').textContent = formatTime(recSeconds);
    }, 1000);
    btn.textContent = '⏸';
    btn.className = 'rec-btn btn-record recording';
    document.getElementById('recStatus').textContent = '🔴 录音中... 点击暂停，双击停止';
    document.getElementById('playBtn').disabled = true;
    document.getElementById('saveBtn').disabled = true;
  } catch (e) {
    document.getElementById('recStatus').textContent = '⚠️ 无法访问麦克风，请检查浏览器权限';
  }
}

function stopRecording() {
  if (mediaRecorder && (mediaRecorder.state === 'recording' || mediaRecorder.state === 'paused')) mediaRecorder.stop();
  clearInterval(recTimer);
}

// Double-click to stop recording completely
document.addEventListener('DOMContentLoaded', () => {
  const recBtn = document.getElementById('recordBtn');
  if (recBtn) {
    recBtn.addEventListener('dblclick', (e) => {
      e.preventDefault();
      if (mediaRecorder && (mediaRecorder.state === 'recording' || mediaRecorder.state === 'paused')) {
        stopRecording();
      }
    });
  }
});

function playRecording() {
  if (!recBlob) return;
  const url = URL.createObjectURL(recBlob);
  const audio = new Audio(url); audio.play();
  document.getElementById('recStatus').textContent = '▶ 播放中...';
  audio.onended = () => document.getElementById('recStatus').textContent = '播放完毕！';
}

function saveCurrentRecording() {
  if (!recBlob) return;
  const bookId = currentReading.bookId;
  const lessonId = currentReading.lessonId;
  const date = new Date();
  const dateStr = date.toLocaleDateString('zh-CN');
  const timeStr = date.toTimeString().slice(0,5).replace(':','-');
  const filename = `录音-第${bookId}册-第${lessonId}课-${dateStr}-${timeStr}.webm`;

  // Trigger file download
  const url = URL.createObjectURL(recBlob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  // Track in localStorage for display
  if (!state.recordingLog) state.recordingLog = [];
  state.recordingLog.push({ bookId, lessonId, date: dateStr, duration: recSeconds, filename });
  state.xp += 2;
  document.getElementById('xpLabel').textContent = state.xp;
  saveState();
  document.getElementById('recStatus').textContent = `✅ 录音已下载！${filename} +2 💎`;
  document.getElementById('saveBtn').disabled = true;
  loadSavedList(bookId, lessonId);
}

function loadSavedList(bookId, lessonId) {
  const list = document.getElementById('savedList');
  if (!state.recordingLog) { list.innerHTML = ''; return; }
  const recs = state.recordingLog.filter(r => r.bookId === bookId && r.lessonId === lessonId);
  if (!recs.length) { list.innerHTML = ''; return; }
  list.innerHTML = `<div style="font-size:12px;color:var(--gray-dark);font-weight:700;margin-bottom:4px">已下载录音 (${recs.length})</div>` +
    recs.slice(-5).reverse().map(r => `
      <div class="saved-item">
        <span style="flex:1">📁 ${r.filename || r.date} · ${formatTime(r.duration)}</span>
      </div>`).join('') +
    `<div style="font-size:11px;color:var(--gray);margin-top:6px;text-align:center">💡 录音保存在浏览器的"下载"文件夹中<br>建议创建一个「录音」文件夹来整理</div>`;
}

function formatTime(s) {
  return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

        <div class="book-label" style="background:${book.color}">${book.title}</div>
        ${book.lessons.map(lesson => `
          <div class="lesson-row">
            <div class="lesson-info">
              <div class="lesson-row-title">${lesson.title}</div>
              <div class="lesson-chars-preview">${lesson.characters.map(c=>c.char).join(' ')}</div>
            </div>
            ${(lesson.story || lesson.sentences) ? `<button class="jump-btn" style="background:var(--purple);margin-right:4px" onclick="closeParentMode();openReadingScreen(${book.id},${lesson.id})">📖</button>` : ''}
            <button class="jump-btn" onclick="jumpToLesson(${book.id},${lesson.id})">进入</button>
          </div>
        `).join('')}
      </div>
    `).join('')}
  `;
  document.getElementById('parentModal').classList.add('show');
}

function closeParentMode() {
  document.getElementById('parentModal').classList.remove('show');
}

function closeParentIfOutside(e) {
  if (e.target === document.getElementById('parentModal')) closeParentMode();
}

function confirmReset() {
  if (confirm('确定要清除所有学习进度吗？此操作无法撤销。')) {
    localStorage.removeItem('chineseTutor');
    state = defaultState();
    saveState();
    closeParentMode();
    renderHome();
  }
}

function jumpToLesson(bookId, lessonId) {
  closeParentMode();
  startLesson(bookId, lessonId);
}

// ===================================================================
// INIT
// ===================================================================
renderHome();
</script>
</body>
</html>
